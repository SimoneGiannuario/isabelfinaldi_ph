<!doctype html>
<html lang="it" itemscope itemtype="https://schema.org/WebSite">

<head>
  <meta itemprop="name" content="Naitiry — Photography" />
  <meta itemprop="url" content="https://naitiry.com" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="author" content="Naitiry" />
  <meta name="theme-color" content="#0e0e0e" />

  <!-- Preload LCP Logo image -->
  <link rel="preload" as="image" href="/images/logo1.webp" fetchpriority="high" />


  <!-- Favicon -->
  <link rel="shortcut icon" type="image/x-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" />
  <link rel="apple-touch-icon" type="image/x-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" />
  <!-- Inline styles for instant First Contentful Paint -->

  <!-- Google Analytics (deferred — loads after page becomes idle) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YP2XJGF1FZ');
    (function () {
      var cb = function () {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-YP2XJGF1FZ';
        document.head.appendChild(s);
      };
      if (typeof requestIdleCallback === 'function') { requestIdleCallback(cb); }
      else { setTimeout(cb, 2000); }
    })();
  </script>


  <style>
    body {
      margin: 0;
      background-color: #0e0e0e;
      color: #fefaf9;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0e0e0e;
      z-index: 9999;
    }

    .loader-logo {
      font-size: 1.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loader-line-container {
      width: 150px;
      height: 1px;
      background-color: rgba(245, 240, 235, 0.1);
      position: relative;
      overflow: hidden;
    }

    .loader-line {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background-color: #ccaa88;
      animation: slide 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes slide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(250%);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- This skeleton is wiped instantly when React mounts -->
    <div id="initial-loader">
      <h1 class="loader-logo">Naitiry — Fotografa a Foggia</h1>
      <div class="loader-line-container">
        <div class="loader-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
