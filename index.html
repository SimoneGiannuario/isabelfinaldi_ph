<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Naitiry — Fotografa | Portfolio</title>
  <meta name="description"
    content="Naitiry — Portfolio Fotografico. Ritratti, Paesaggi, Street, Eventi e Creatività. Basata a Foggia, disponibile in tutta la provincia." />
  <meta name="author" content="Naitiry" />
  <meta name="theme-color" content="#0e0e0e" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Naitiry — Portfolio Fotografico" />
  <meta property="og:description"
    content="Catturando emozioni, luce e storie attraverso l'obiettivo. Portfolio fotografico di Naitiry." />
  <meta property="og:url" content="https://naitiry.vercel.app" />
  <meta property="og:site_name" content="Naitiry — Portfolio Fotografico" />
  <meta property="og:locale" content="it_IT" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Naitiry — Portfolio Fotografico" />
  <meta name="twitter:description" content="Catturando emozioni, luce e storie attraverso l'obiettivo." />

  <!-- Preload hero image for optimal LCP -->
  <link rel="preload" as="image" href="/images/landscape_sunset.webp"
    imagesrcset="/images/landscape_sunset-400w.webp 400w, /images/landscape_sunset-800w.webp 800w, /images/landscape_sunset-1200w.webp 1200w, /images/landscape_sunset.webp 1600w"
    imagesizes="100vw" fetchpriority="high" />

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" />
  <!-- Inline styles for instant First Contentful Paint -->


  <style>
    body {
      margin: 0;
      background-color: #0e0e0e;
      color: #f5f0eb;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0e0e0e;
      z-index: 9999;
    }

    .loader-logo {
      font-size: 1.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loader-line-container {
      width: 150px;
      height: 1px;
      background-color: rgba(245, 240, 235, 0.1);
      position: relative;
      overflow: hidden;
    }

    .loader-line {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background-color: #ccaa88;
      animation: slide 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes slide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(250%);
      }
    }
  </style>
</head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-YP2XJGF1FZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());

  gtag('config', 'G-YP2XJGF1FZ');
</script>

<body>
  <div id="root">
    <!-- This skeleton is wiped instantly when React mounts -->
    <div id="initial-loader">
      <div class="loader-logo">Isabel Finaldi</div>
      <div class="loader-line-container">
        <div class="loader-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
